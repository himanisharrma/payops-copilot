services:
  postgres:
    image: postgres:17-alpine
    container_name: payops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: payops
      POSTGRES_USER: payops
      POSTGRES_PASSWORD: payops_local
    ports:
      - "5438:5432"
    volumes:
      - payops_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payops -d payops"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  payops_postgres_data:
